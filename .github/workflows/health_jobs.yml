name: Healthcare Job Monitor

on:
  schedule:
    - cron: '0 */8 * * *'   # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-playwright:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # 5️⃣ Run UW scraper
      - name: Run UW scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: npx playwright test tests/find_jobs_uw.spec.ts --reporter=list

      # 6️⃣ Run Providence scraper
      - name: Run Providence scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: npx playwright test tests/find_jobs_providence.spec.ts --reporter=list

      # 7️⃣ Run Seattle Children scraper
      - name: Run Seattle Children scraper
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: npx playwright test tests/find_jobs_childrens.spec.ts --reporter=list

      # 8️⃣ Debug (VERIFY CSV FILES EXIST)
      - name: Debug file output
        run: ls -lah

      # 9️⃣ Commit CSV updates
      - name: Commit CSV updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add *.csv

          git status

          git diff --cached --quiet && echo "No changes" || (
            git commit -m "update healthcare jobs"
            git push
          )
