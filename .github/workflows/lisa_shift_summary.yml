name: LISA Shift Summary

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # allows manual trigger
  
jobs:
  run-playwright:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install dependencies
      - name: Install Node.js dependencies
        run: npm ci

      # 4️⃣ Install Playwright Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run Playwright test
      - name: Run LISA Playwright test
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          LISA_EMAIL: ${{ secrets.LISA_EMAIL }}
          LISA_PASSWORD: ${{ secrets.LISA_PASSWORD }}
        run: npx playwright test tests/lisa-login.spec.ts --headed --reporter=list
