<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brooks Running — Digital Products Operations Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --brooks-blue:   #1A66A0;
      --brooks-blue-d: #134e7a;
      --brooks-blue-l: #2a83cc;
      --bg:            #f4f6f9;
      --surface:       #ffffff;
      --surface-alt:   #f0f4f8;
      --border:        #dde4ec;
      --border-dark:   #c4cdd8;
      --text:          #1a2535;
      --text-mid:      #4a5e74;
      --text-dim:      #8a9cb0;
      --green:         #0c9e6b;
      --green-bg:      #e6f7f2;
      --green-border:  #b3e8d6;
      --red:           #d63b3b;
      --red-bg:        #fdf0f0;
      --red-border:    #f5c0c0;
      --amber:         #d97706;
      --amber-bg:      #fffbeb;
      --amber-border:  #fde68a;
      --header-h:      64px;
      --font-display:  'Barlow Condensed', sans-serif;
      --font-body:     'Barlow', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--brooks-blue);
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(26,102,160,0.25);
    }

    .header-left {
      display: flex; align-items: center; gap: 18px;
    }

    /* Brooks wordmark in SVG inline */
    .brooks-wordmark {
      height: 22px;
      fill: white;
      display: block;
    }

    .header-divider {
      width: 1px; height: 28px;
      background: rgba(255,255,255,0.3);
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
    }

    .header-right {
      display: flex; align-items: center; gap: 16px;
    }

    .last-run {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      font-family: var(--font-body);
    }

    .btn-refresh {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.22); }
    .btn-refresh.spinning svg { animation: spin 0.7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .auto-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: rgba(255,255,255,0.75);
      cursor: pointer; user-select: none;
    }
    .auto-pill input { display: none; }
    .toggle {
      width: 32px; height: 18px;
      background: rgba(255,255,255,0.2);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle::after {
      content: '';
      width: 14px; height: 14px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: all 0.2s;
    }
    .toggle.on { background: #39d98a; }
    .toggle.on::after { left: 15px; background: white; }

    /* ── MAIN ───────────────────────────────────────────── */
    main { max-width: 1440px; margin: 0 auto; padding: 28px 32px 60px; }

    /* ── KPI BAND ────────────────────────────────────────── */
    .kpi-band {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .kpi {
      background: var(--surface);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .kpi-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .kpi-value {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }
    .kpi-value.healthy { color: var(--green); }
    .kpi-value.warning { color: var(--amber); }
    .kpi-value.critical { color: var(--red); }
    .kpi-value.brand   { color: var(--brooks-blue); }

    .kpi-sub {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 400;
    }

    .kpi-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .kpi-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .kpi-bar-fill.healthy { background: var(--green); }
    .kpi-bar-fill.warning { background: var(--amber); }
    .kpi-bar-fill.critical { background: var(--red); }
    .kpi-bar-fill.brand   { background: var(--brooks-blue); }

    /* ── SECTION HEADER ─────────────────────────────────── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    /* ── PAGE TYPE TABS ─────────────────────────────────── */
    .type-tabs {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .type-tab {
      padding: 5px 14px;
      border-radius: 99px;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-mid);
      transition: all 0.15s;
    }
    .type-tab:hover { border-color: var(--brooks-blue); color: var(--brooks-blue); }
    .type-tab.active { background: var(--brooks-blue); border-color: var(--brooks-blue); color: white; }

    /* ── PAGE CARDS GRID ─────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .page-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .page-card:hover { box-shadow: 0 4px 16px rgba(26,102,160,0.1); transform: translateY(-1px); }
    .page-card.healthy { border-top: 3px solid var(--green); }
    .page-card.degraded { border-top: 3px solid var(--amber); }
    .page-card.critical { border-top: 3px solid var(--red); }

    .card-top {
      padding: 14px 16px 12px;
      display: flex; align-items: flex-start; justify-content: space-between;
      border-bottom: 1px solid var(--surface-alt);
    }

    .card-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--surface-alt);
      color: var(--brooks-blue);
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .card-url-link {
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      display: block;
      margin-top: 3px;
      word-break: break-all;
      transition: color 0.15s;
    }
    .card-url-link:hover { color: var(--brooks-blue); text-decoration: underline; }

    .status-chip {
      flex-shrink: 0;
      margin-left: 10px;
      padding: 4px 10px;
      border-radius: 99px;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-chip.healthy { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .status-chip.critical { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .status-chip.degraded { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }

    .card-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 12px 16px;
      gap: 10px;
      border-bottom: 1px solid var(--surface-alt);
    }
    .metric { display: flex; flex-direction: column; gap: 3px; }
    .metric-lbl {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--font-display);
    }
    .metric-val {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .metric-val.fast { color: var(--green); }
    .metric-val.medium { color: var(--amber); }
    .metric-val.slow { color: var(--red); }

    /* Keyword pills */
    .card-keywords {
      padding: 10px 16px 14px;
    }
    .kw-row-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      font-family: var(--font-display);
      margin-bottom: 6px;
    }
    .kw-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .kw-pill {
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .kw-pill.pass { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .kw-pill.fail { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .card-error {
      padding: 8px 16px;
      background: var(--red-bg);
      border-top: 1px solid var(--red-border);
      font-size: 12px;
      color: var(--red);
      display: flex; align-items: flex-start; gap: 6px;
    }

    /* Uptime dots */
    .card-history {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--surface-alt);
    }
    .history-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .history-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-dim); font-family: var(--font-display);
    }
    .uptime-pct {
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
    }
    .uptime-pct.good { color: var(--green); }
    .uptime-pct.warn { color: var(--amber); }
    .uptime-pct.bad  { color: var(--red); }

    .dots { display: flex; gap: 2px; }
    .dot {
      width: 8px; height: 16px; border-radius: 2px;
    }
    .dot.up   { background: var(--green); opacity: 0.8; }
    .dot.down { background: var(--red);   opacity: 0.8; }
    .dot.empty{ background: var(--border); }

    /* ── DETAIL TABLE ────────────────────────────────────── */
    .controls {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .ctrl-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    .ctrl-select:focus { border-color: var(--brooks-blue); }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left;
      padding: 11px 16px;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7fafd; }
    tbody td { padding: 10px 16px; color: var(--text); white-space: nowrap; }

    .td-name { font-weight: 600; }
    .td-url a { color: var(--brooks-blue); text-decoration: none; font-size: 12px; }
    .td-url a:hover { text-decoration: underline; }
    .td-type span {
      padding: 2px 8px; border-radius: 3px;
      font-family: var(--font-display); font-size: 10px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      background: var(--surface-alt); color: var(--brooks-blue);
      border: 1px solid var(--border);
    }
    .pill-up   { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; font-family: var(--font-display); letter-spacing: 0.05em; }
    .pill-down { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-border);   padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; font-family: var(--font-display); letter-spacing: 0.05em; }
    .ms        { font-family: 'Barlow Condensed', monospace; font-weight: 600; }
    .ms.fast   { color: var(--green); }
    .ms.medium { color: var(--amber); }
    .ms.slow   { color: var(--red); }

    .kw-inline { display: flex; flex-wrap: wrap; gap: 3px; }
    .kw-inline span { font-size: 11px; padding: 1px 7px; border-radius: 99px; }
    .kw-inline .p { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .kw-inline .f { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .td-error { font-size: 12px; color: var(--red); max-width: 200px; overflow: hidden; text-overflow: ellipsis; }

    /* ── EMPTY / LOADER ─────────────────────────────────── */
    #loader {
      position: fixed; inset: 0;
      background: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; gap: 14px;
    }
    .spin-ring {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--brooks-blue);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    #loader p { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.05em; color: var(--text-dim); }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 900px) {
      .kpi-band { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      header { padding: 0 16px; }
      main { padding: 16px 16px 40px; }
      .kpi-band { grid-template-columns: repeat(2, 1fr); }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="spin-ring"></div>
  <p>Loading monitor data…</p>
</div>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <!-- Brooks wordmark SVG approximation -->
    <svg class="brooks-wordmark" viewBox="0 0 120 24" xmlns="http://www.w3.org/2000/svg">
      <text y="20" font-family="Barlow Condensed, sans-serif" font-size="22" font-weight="800" fill="white" letter-spacing="1">BROOKS</text>
    </svg>
    <div class="header-divider"></div>
    <span class="header-title">Digital Products Operations · Site Health</span>
  </div>
  <div class="header-right">
    <span class="last-run" id="last-run">—</span>
    <label class="auto-pill" title="Auto-refresh every 60s">
      <input type="checkbox" id="auto-chk" checked/>
      <div class="toggle on" id="toggle-el"></div>
      AUTO-REFRESH
    </label>
    <button class="btn-refresh" id="refresh-btn" onclick="loadData()">
      <svg id="refresh-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.5 2.5A7 7 0 1 0 14.5 9"/>
        <polyline points="14.5 2 14.5 6 10.5 6"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main>

  <!-- KPI BAND -->
  <div class="kpi-band" id="kpi-band"></div>

  <!-- LIVE CARDS -->
  <div class="section-head">
    <span class="section-title">Page Status</span>
    <div class="type-tabs" id="type-tabs"></div>
  </div>
  <div class="cards-grid" id="cards-grid"></div>

  <!-- DETAIL TABLE -->
  <div class="section-head">
    <span class="section-title">Check History</span>
    <div class="controls">
      <select class="ctrl-select" id="f-page" onchange="renderTable()"><option value="">All Pages</option></select>
      <select class="ctrl-select" id="f-type" onchange="renderTable()"><option value="">All Types</option></select>
      <select class="ctrl-select" id="f-status" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option value="up">Healthy</option>
        <option value="down">Degraded / Down</option>
      </select>
      <select class="ctrl-select" id="f-rows" onchange="renderTable()">
        <option value="50">Last 50</option>
        <option value="100">Last 100</option>
        <option value="all">All</option>
      </select>
    </div>
  </div>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Timestamp (UTC)</th>
          <th>Page</th>
          <th>Type</th>
          <th>URL</th>
          <th>Status</th>
          <th>HTTP</th>
          <th>Response</th>
          <th>Keywords</th>
          <th>Error</th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>

</main>

<script>
  const CSV_PATH = "results.csv";
  let allRows = [];
  let activeType = "ALL";
  let refreshTimer = null;

  // ── AUTO REFRESH ─────────────────────────────────
  const autoChk = document.getElementById('auto-chk');
  const toggleEl = document.getElementById('toggle-el');
  autoChk.addEventListener('change', () => {
    toggleEl.classList.toggle('on', autoChk.checked);
    autoChk.checked ? startAuto() : stopAuto();
  });
  document.querySelector('.auto-pill').addEventListener('click', e => {
    if (e.target.tagName === 'INPUT') return;
    autoChk.checked = !autoChk.checked;
    autoChk.dispatchEvent(new Event('change'));
  });
  function startAuto() { stopAuto(); refreshTimer = setInterval(loadData, 60000); }
  function stopAuto()  { if (refreshTimer) clearInterval(refreshTimer); }

  // ── CSV PARSER ───────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim());
    return lines.slice(1).map(line => {
      // Handle quoted fields
      const vals = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      vals.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g, ''); });
      return obj;
    }).filter(r => r.timestamp && r.url);
  }

  function tryJSON(s, fallback) {
    try { return JSON.parse(s); } catch { return fallback; }
  }

  // ── LOAD ─────────────────────────────────────────
  async function loadData() {
    const btn = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    btn.classList.add('spinning');
    try {
      const res = await fetch(CSV_PATH + '?t=' + Date.now());
      const txt = await res.text();
      allRows = parseCSV(txt).reverse(); // newest first
      renderAll();
      const now = new Date();
      document.getElementById('last-run').textContent =
        'Last checked ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    } catch(e) {
      console.error(e);
      document.getElementById('last-run').textContent = 'Error loading data';
    }
    btn.classList.remove('spinning');
    document.getElementById('loader').style.display = 'none';
  }

  // ── HELPERS ──────────────────────────────────────
  function latestPerSite() {
    const m = new Map();
    for (const r of allRows) if (!m.has(r.url)) m.set(r.url, r);
    return Array.from(m.values());
  }

  function siteHistory(url) { return allRows.filter(r => r.url === url); }

  function msClass(ms) {
    if (!ms) return '';
    const n = parseInt(ms);
    return n < 500 ? 'fast' : n < 1500 ? 'medium' : 'slow';
  }

  function cardClass(r) {
    if (r.is_up === 'true') return 'healthy';
    const failed = tryJSON(r.keywords_failed, []);
    return failed.length ? 'degraded' : 'critical';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── RENDER ALL ───────────────────────────────────
  function renderAll() {
    renderKPIs();
    renderTypeTabs();
    renderCards();
    populateFilters();
    renderTable();
  }

  // ── KPIs ─────────────────────────────────────────
  function renderKPIs() {
    const latest = latestPerSite();
    const total = latest.length;
    const up = latest.filter(r => r.is_up === 'true').length;
    const down = total - up;
    const upPct = total ? Math.round(up / total * 100) : 0;
    const msTimes = latest.filter(r => r.response_time_ms && r.is_up==='true').map(r=>parseInt(r.response_time_ms));
    const avgMs = msTimes.length ? Math.round(msTimes.reduce((a,b)=>a+b,0)/msTimes.length) : null;
    const overallUptime = calcOverallUptime();
    const lastCheck = allRows.length ? allRows[0].timestamp.replace('T',' ').replace('Z','') : '—';

    const kpiClass = n => n === 100 ? 'healthy' : n >= 80 ? 'warning' : 'critical';
    const msKpiClass = ms => ms === null ? 'brand' : ms < 500 ? 'healthy' : ms < 1500 ? 'warning' : 'critical';

    document.getElementById('kpi-band').innerHTML = `
      <div class="kpi">
        <div class="kpi-label">Healthy Pages</div>
        <div class="kpi-value ${kpiClass(upPct)}">${up}<span style="font-size:20px;opacity:.6">/${total}</span></div>
        <div class="kpi-sub">${upPct}% of monitored pages</div>
        <div class="kpi-bar"><div class="kpi-bar-fill ${kpiClass(upPct)}" style="width:${upPct}%"></div></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Incidents</div>
        <div class="kpi-value ${down===0?'healthy':'critical'}">${down}</div>
        <div class="kpi-sub">${down===0?'All clear':'Pages need attention'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Overall Uptime</div>
        <div class="kpi-value ${kpiClass(overallUptime)}">${overallUptime}<span style="font-size:18px">%</span></div>
        <div class="kpi-sub">Across all checks</div>
        <div class="kpi-bar"><div class="kpi-bar-fill ${kpiClass(overallUptime)}" style="width:${overallUptime}%"></div></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg Response</div>
        <div class="kpi-value ${msKpiClass(avgMs)}">${avgMs===null?'—':avgMs}<span style="font-size:18px;opacity:.7">${avgMs!==null?'ms':''}</span></div>
        <div class="kpi-sub">Live healthy pages</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Total Checks</div>
        <div class="kpi-value brand">${allRows.length.toLocaleString()}</div>
        <div class="kpi-sub">In history log</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Last Run</div>
        <div class="kpi-value brand" style="font-size:18px;line-height:1.4">${lastCheck.split(' ')[1]||'—'}</div>
        <div class="kpi-sub">${lastCheck.split(' ')[0]||''} UTC</div>
      </div>
    `;
  }

  function calcOverallUptime() {
    if (!allRows.length) return 100;
    const up = allRows.filter(r => r.is_up==='true').length;
    return Math.round(up / allRows.length * 100);
  }

  // ── TYPE TABS ─────────────────────────────────────
  function renderTypeTabs() {
    const types = ['ALL', ...new Set(latestPerSite().map(r => r.page_type).filter(Boolean).sort())];
    document.getElementById('type-tabs').innerHTML = types.map(t =>
      `<div class="type-tab ${t===activeType?'active':''}" onclick="setType('${t}')">${t}</div>`
    ).join('');
  }

  function setType(t) {
    activeType = t;
    renderTypeTabs();
    renderCards();
  }

  // ── CARDS ─────────────────────────────────────────
  function renderCards() {
    let pages = latestPerSite();
    if (activeType !== 'ALL') pages = pages.filter(r => r.page_type === activeType);

    if (!pages.length) {
      document.getElementById('cards-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim)">No pages match this filter.</div>';
      return;
    }

    document.getElementById('cards-grid').innerHTML = pages.map(r => {
      const hist = siteHistory(r.url);
      const upCount = hist.filter(x => x.is_up==='true').length;
      const uptimePct = hist.length ? Math.round(upCount/hist.length*100) : 100;
      const pctCls = uptimePct>=99?'good':uptimePct>=90?'warn':'bad';
      const cls = cardClass(r);
      const statusLabel = r.is_up==='true' ? '✓ Healthy' : (tryJSON(r.keywords_failed,[]).length ? '⚠ Degraded' : '✗ Down');
      const ms = r.response_time_ms ? parseInt(r.response_time_ms) : null;

      const kwPassed = tryJSON(r.keywords_passed, []);
      const kwFailed = tryJSON(r.keywords_failed, []);
      const kwAll = [...kwPassed.map(k=>`<span class="kw-pill pass">✓ ${esc(k)}</span>`),
                    ...kwFailed.map(k=>`<span class="kw-pill fail">✗ ${esc(k)}</span>`)].join('');

      const last20 = hist.slice(0,20).reverse();
      const dots = Array(20).fill(0).map((_,i) => {
        if (i >= last20.length) return `<div class="dot empty"></div>`;
        return `<div class="dot ${last20[i].is_up==='true'?'up':'down'}" title="${last20[i].timestamp}"></div>`;
      }).join('');

      const errRow = r.error
        ? `<div class="card-error"><span>⚠</span><span>${esc(r.error)}</span></div>` : '';

      return `
        <div class="page-card ${cls}">
          <div class="card-top">
            <div>
              <div class="card-type-badge">${esc(r.page_type||'—')}</div>
              <div class="card-name">${esc(r.name)}</div>
              <a class="card-url-link" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.url)}</a>
            </div>
            <span class="status-chip ${cls}">${statusLabel}</span>
          </div>
          <div class="card-metrics">
            <div class="metric">
              <div class="metric-lbl">Response</div>
              <div class="metric-val ${msClass(ms)}">${ms!==null?ms+'ms':'—'}</div>
            </div>
            <div class="metric">
              <div class="metric-lbl">HTTP Code</div>
              <div class="metric-val ${r.status_code==='200'?'fast':r.status_code?'medium':''}">${r.status_code||'—'}</div>
            </div>
            <div class="metric">
              <div class="metric-lbl">Keywords</div>
              <div class="metric-val ${kwFailed.length===0?'fast':'slow'}">${kwPassed.length}/${kwPassed.length+kwFailed.length}</div>
            </div>
          </div>
          ${kwAll ? `<div class="card-keywords"><div class="kw-row-label">Keyword checks</div><div class="kw-pills">${kwAll}</div></div>` : ''}
          ${errRow}
          <div class="card-history">
            <div class="history-row">
              <span class="history-label">Last ${last20.length} runs</span>
              <span class="uptime-pct ${pctCls}">${uptimePct}% uptime</span>
            </div>
            <div class="dots">${dots}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── FILTERS ──────────────────────────────────────
  function populateFilters() {
    const names = [...new Set(allRows.map(r=>r.name))].sort();
    const types = [...new Set(allRows.map(r=>r.page_type).filter(Boolean))].sort();
    const fp = document.getElementById('f-page');
    const ft = document.getElementById('f-type');
    const curP = fp.value, curT = ft.value;
    fp.innerHTML = '<option value="">All Pages</option>' + names.map(n=>`<option value="${esc(n)}" ${n===curP?'selected':''}>${esc(n)}</option>`).join('');
    ft.innerHTML = '<option value="">All Types</option>' + types.map(t=>`<option value="${esc(t)}" ${t===curT?'selected':''}>${esc(t)}</option>`).join('');
  }

  // ── TABLE ─────────────────────────────────────────
  function renderTable() {
    const fPage   = document.getElementById('f-page').value;
    const fType   = document.getElementById('f-type').value;
    const fStatus = document.getElementById('f-status').value;
    const fRows   = document.getElementById('f-rows').value;

    let rows = allRows;
    if (fPage)   rows = rows.filter(r => r.name === fPage);
    if (fType)   rows = rows.filter(r => r.page_type === fType);
    if (fStatus === 'up')   rows = rows.filter(r => r.is_up === 'true');
    if (fStatus === 'down') rows = rows.filter(r => r.is_up !== 'true');
    if (fRows !== 'all') rows = rows.slice(0, parseInt(fRows));

    if (!rows.length) {
      document.getElementById('tbl-body').innerHTML =
        '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-dim)">No records match current filters.</td></tr>';
      return;
    }

    document.getElementById('tbl-body').innerHTML = rows.map(r => {
      const ms = r.response_time_ms ? parseInt(r.response_time_ms) : null;
      const kwPassed = tryJSON(r.keywords_passed, []);
      const kwFailed = tryJSON(r.keywords_failed, []);
      const kwHtml = [
        ...kwPassed.map(k=>`<span class="p">${esc(k)}</span>`),
        ...kwFailed.map(k=>`<span class="f">${esc(k)}</span>`)
      ].join('');
      return `<tr>
        <td>${esc(r.timestamp.replace('T',' ').replace('Z',''))}</td>
        <td class="td-name">${esc(r.name)}</td>
        <td class="td-type"><span>${esc(r.page_type||'—')}</span></td>
        <td class="td-url"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.url.replace('https://www.brooksrunning.com',''))}</a></td>
        <td>${r.is_up==='true' ? '<span class="pill-up">✓ Healthy</span>' : '<span class="pill-down">✗ Down</span>'}</td>
        <td>${r.status_code||'—'}</td>
        <td class="ms ${msClass(ms)}">${ms!==null?ms+'ms':'—'}</td>
        <td><div class="kw-inline">${kwHtml||'<span style="color:var(--text-dim)">—</span>'}</div></td>
        <td class="td-error" title="${esc(r.error)}">${r.error?esc(r.error):'<span style="color:var(--text-dim)">—</span>'}</td>
      </tr>`;
    }).join('');
  }

  // ── INIT ─────────────────────────────────────────
  loadData();
  startAuto();
</script>
</body>
</html>
